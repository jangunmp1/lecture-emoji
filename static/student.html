<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>강의 반응</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root { --accent: #a78bfa; --accent-dim: rgba(167,139,250,0.15); }

    body {
      background: #080812;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    #header-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--accent);
    }

    #count-text {
      font-size: 0.82rem;
      color: #64748b;
    }

    #exit-btn {
      background: none;
      border: none;
      color: #475569;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
      visibility: hidden;
    }

    #exit-btn:hover {
      color: #94a3b8;
      background: rgba(255,255,255,0.06);
    }

    /* ── Emoji grid ── */
    #emoji-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding: 28px 20px;
      width: 100%;
      max-width: 420px;
    }

    .emoji-btn {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.09);
      border-radius: 22px;
      font-size: 2.6rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .emoji-btn:active {
      transform: scale(0.86);
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .emoji-btn.flash {
      animation: btnFlash 0.45s ease forwards;
    }

    @keyframes btnFlash {
      0%   { background: rgba(167,139,250,0.35); border-color: var(--accent); }
      100% { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.09); }
    }

    /* ── Cooldown bar ── */
    #cooldown-track {
      width: 76%;
      max-width: 300px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    #cooldown-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ── Big emoji feedback ── */
    #big-emoji {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.12s, transform 0.12s;
      z-index: 999;
    }

    #big-emoji.show {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Question input ── */
    #question-area {
      width: 100%;
      max-width: 420px;
      padding: 0 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #question-area label {
      font-size: 0.82rem;
      color: #94a3b8;
    }

    #question-row {
      display: flex;
      gap: 8px;
    }

    #question-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    #question-input:focus {
      border-color: var(--accent);
    }

    #question-send {
      background: var(--accent-dim);
      border: 2px solid rgba(167,139,250,0.4);
      border-radius: 14px;
      padding: 10px 16px;
      color: var(--accent);
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    #question-send:active {
      background: rgba(167,139,250,0.3);
    }

    #question-send:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #char-count {
      font-size: 0.75rem;
      color: #475569;
      text-align: right;
    }

    /* ── Room entry ── */
    #room-entry {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 20px;
    }

    .entry-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    .entry-card h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }

    .entry-card .entry-hint {
      font-size: 0.85rem;
      color: #64748b;
    }

    #room-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 14px 16px;
      color: #e2e8f0;
      font-size: 1.6rem;
      font-family: monospace;
      letter-spacing: 0.2em;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.15s;
    }

    #room-input:focus { border-color: var(--accent); }

    #room-join {
      width: 100%;
      background: var(--accent-dim);
      border: 2px solid rgba(167,139,250,0.4);
      border-radius: 14px;
      padding: 14px;
      color: var(--accent);
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    #room-join:active { background: rgba(167,139,250,0.3); }

    .entry-error {
      color: #f87171;
      font-size: 0.85rem;
    }

    /* ── Room list (student) ── */
    .room-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .room-item {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: #e2e8f0;
      font-family: inherit;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .room-item:active {
      background: rgba(167,139,250,0.15);
      border-color: rgba(167,139,250,0.4);
    }

    .back-link {
      background: none;
      border: none;
      color: #475569;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }

    .back-link:hover { color: #94a3b8; }

    /* ── Status ── */
    #statusbar {
      font-size: 0.78rem;
      color: #334155;
      padding: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div style="width:72px"></div>
  <div id="header-center">
    <h1>🎓 강의 반응</h1>
    <div id="count-text">참여자 <span id="count">0</span>명</div>
  </div>
  <button id="exit-btn">나가기 →</button>
</header>

<div id="room-entry">
  <!-- 패널 1: 수업 목록 -->
  <div id="panel-list" class="entry-card" style="max-width:420px">
    <div style="font-size:2rem">🎓</div>
    <h2>수업 목록</h2>
    <div id="student-room-list" class="room-list"></div>
    <p id="student-no-rooms" class="entry-hint" style="display:none">개설된 수업이 없습니다</p>
  </div>

  <!-- 패널 2: 방 코드 입력 -->
  <div id="panel-code" class="entry-card" style="display:none">
    <h2 id="panel-room-title">수업 참여</h2>
    <p class="entry-hint">강사 화면의 방 코드를 입력하세요</p>
    <input id="room-input" type="text" maxlength="6" placeholder="ABC123"
           autocomplete="off" autocapitalize="characters" spellcheck="false" />
    <button id="room-join">참여하기</button>
    <p id="room-error" class="entry-error" style="display:none">
      방 코드가 올바르지 않습니다. 다시 확인해주세요.
    </p>
    <button id="back-to-list" class="back-link">← 다른 수업 선택</button>
  </div>
</div>

<div id="emoji-grid">
  <button class="emoji-btn" data-emoji="👍">👍</button>
  <button class="emoji-btn" data-emoji="👏">👏</button>
  <button class="emoji-btn" data-emoji="❤️">❤️</button>
  <button class="emoji-btn" data-emoji="😂">😂</button>
  <button class="emoji-btn" data-emoji="🤔">🤔</button>
  <button class="emoji-btn" data-emoji="😮">😮</button>
  <button class="emoji-btn" data-emoji="🔥">🔥</button>
  <button class="emoji-btn" data-emoji="✨">✨</button>
  <button class="emoji-btn" data-emoji="❓">❓</button>
</div>

<div id="cooldown-track"><div id="cooldown-fill"></div></div>

<div id="question-area">
  <label for="question-input">💬 질문 보내기</label>
  <div id="question-row">
    <input id="question-input" type="text" maxlength="100" placeholder="질문을 입력하세요…" autocomplete="off" />
    <button id="question-send">전송</button>
  </div>
  <div id="char-count">0 / 100</div>
</div>

<div id="statusbar">서버 연결 중…</div>
<div id="big-emoji"></div>

<script>
  const COOLDOWN = 700;
  const host   = window.location.host;
  const proto  = location.protocol === 'https:' ? 'wss' : 'ws';

  const params = new URLSearchParams(location.search);
  const roomId = params.get('room') ? params.get('room').toUpperCase() : null;

  let ws;
  let canSend = true;

  // ── Room entry ──────────────────────────────────────────────────────────────
  let selectedRoomId = null;

  const exitBtn = document.getElementById('exit-btn');

  exitBtn.addEventListener('click', () => {
    if (ws) ws.close();
    history.replaceState(null, '', location.pathname);
    showRoomEntry();
    loadRoomList();
  });

  function showRoomEntry() {
    document.getElementById('room-entry').style.display     = 'flex';
    document.getElementById('emoji-grid').style.display     = 'none';
    document.getElementById('cooldown-track').style.display = 'none';
    document.getElementById('question-area').style.display  = 'none';
    document.getElementById('statusbar').style.display      = 'none';
    exitBtn.style.visibility = 'hidden';
  }

  function showPanel(name) {
    document.getElementById('panel-list').style.display = name === 'list' ? 'flex' : 'none';
    document.getElementById('panel-code').style.display = name === 'code' ? 'flex' : 'none';
    if (name === 'code') document.getElementById('room-input').focus();
  }

  async function loadRoomList() {
    const listEl    = document.getElementById('student-room-list');
    const noRoomsEl = document.getElementById('student-no-rooms');
    listEl.innerHTML = '';
    try {
      const res  = await fetch('/api/rooms');
      const data = await res.json();
      if (!data.length) {
        noRoomsEl.style.display = 'block';
        return;
      }
      noRoomsEl.style.display = 'none';
      data.forEach(room => {
        const btn = document.createElement('button');
        btn.className = 'room-item';
        btn.textContent = room.title;
        btn.addEventListener('click', () => {
          selectedRoomId = room.room_id;
          document.getElementById('panel-room-title').textContent = `🔒 ${room.title}`;
          document.getElementById('room-input').value = '';
          document.getElementById('room-error').style.display = 'none';
          showPanel('code');
        });
        listEl.appendChild(btn);
      });
    } catch {
      noRoomsEl.textContent = '수업 목록을 불러올 수 없습니다.';
      noRoomsEl.style.display = 'block';
    }
  }

  function joinRoom() {
    const code  = document.getElementById('room-input').value.trim().toUpperCase();
    const errEl = document.getElementById('room-error');
    if (!code) return;
    if (code !== selectedRoomId) {
      errEl.style.display = 'block';
      return;
    }
    location.href = `?room=${code}`;
  }

  document.getElementById('room-join').addEventListener('click', joinRoom);
  document.getElementById('room-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinRoom();
  });
  document.getElementById('back-to-list').addEventListener('click', () => {
    selectedRoomId = null;
    showPanel('list');
  });

  // ── WebSocket ──
  function connect() {
    const wsUrl = `${proto}://${host}/ws/student?room=${roomId}`;
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      exitBtn.style.visibility = 'visible';
      document.getElementById('statusbar').textContent = '✅ 연결됨 — 이모지를 눌러보세요!';
    };

    ws.onmessage = ({ data }) => {
      const msg = JSON.parse(data);
      if (msg.type === 'count') document.getElementById('count').textContent = msg.count;
    };

    ws.onclose = (event) => {
      if (event.code === 4004) {
        showRoomEntry();
        loadRoomList();
        return;
      }
      document.getElementById('statusbar').textContent = '⚠️ 연결 끊김 — 재연결 중…';
      setTimeout(connect, 2000);
    };
  }

  if (!roomId) {
    showRoomEntry();
    loadRoomList();
  } else {
    connect();
  }

  // ── Emoji buttons ──
  document.querySelectorAll('.emoji-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!canSend || !ws || ws.readyState !== WebSocket.OPEN) return;

      const emoji = btn.dataset.emoji;
      ws.send(JSON.stringify({ type: 'emoji', emoji }));

      btn.classList.remove('flash');
      void btn.offsetWidth;
      btn.classList.add('flash');

      showBig(emoji);
      startCooldown();
    });
  });

  function showBig(emoji) {
    const el = document.getElementById('big-emoji');
    el.textContent = emoji;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 500);
  }

  // ── Question ──
  const qInput = document.getElementById('question-input');
  const qSend  = document.getElementById('question-send');
  const qCount = document.getElementById('char-count');

  qInput.addEventListener('input', () => {
    qCount.textContent = `${qInput.value.length} / 100`;
  });

  function sendQuestion() {
    const text = qInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    const id = `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
    ws.send(JSON.stringify({ type: 'question', text, id }));
    qInput.value = '';
    qCount.textContent = '0 / 100';
    qSend.disabled = true;
    setTimeout(() => { qSend.disabled = false; }, 3000);
  }

  qSend.addEventListener('click', sendQuestion);
  qInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendQuestion(); });

  function startCooldown() {
    canSend = false;
    const fill = document.getElementById('cooldown-fill');
    fill.style.transition = 'none';
    fill.style.width = '100%';
    requestAnimationFrame(() => {
      fill.style.transition = `width ${COOLDOWN}ms linear`;
      fill.style.width = '0%';
    });
    setTimeout(() => { canSend = true; }, COOLDOWN);
  }
</script>
</body>
</html>
