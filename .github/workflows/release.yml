name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: overlay-linux
          - os: windows-latest
            artifact: overlay-windows.exe
          - os: macos-latest
            artifact: overlay-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements-overlay.txt
          pip install pyinstaller

      - name: Build (Linux / Windows)
        if: runner.os != 'macOS'
        run: pyinstaller --onefile --noconsole --name overlay overlay.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed --name overlay --collect-all PyQt6 overlay.py

          # qt.conf: Qt가 CFBundleCopyBundleURL 대신 번들 내 경로를 사용하도록 강제
          # Contents/Resources/qt.conf → Prefix = Contents/, Plugins = Contents/Frameworks/PyQt6/Qt6/plugins
          mkdir -p dist/overlay.app/Contents/Resources
          printf '[Paths]\nPlugins = Frameworks/PyQt6/Qt6/plugins\n' \
            > dist/overlay.app/Contents/Resources/qt.conf

          # permissions 플러그인 삭제 (안전망: qt.conf로 격리되더라도 아예 제거)
          find dist/overlay.app -name "*permission*" -delete 2>/dev/null || true

          codesign --force --deep --sign - dist/overlay.app
          cd dist && zip -r overlay-macos.zip overlay.app

      - name: Stage artifact
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            mv dist/overlay.exe "dist/${{ matrix.artifact }}"
          elif [ "$RUNNER_OS" = "Linux" ]; then
            mv dist/overlay "dist/${{ matrix.artifact }}"
          fi
          # macOS: zip already named correctly in build step

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
          generate_release_notes: true
